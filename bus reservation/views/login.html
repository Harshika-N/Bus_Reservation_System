<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DMNS Bus Reservation</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <nav>
    <div class="logo">🚌 DMNS Bus Reservation</div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/search">Search Buses</a>
      <a href="/register">Register</a>
      <a href="/login" class="btn-primary">Login</a>
    </div>
  </nav>
  <main>
    <section class="form-section">
      <h2>Welcome to Bus Reservation</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="form-footer">Don't have an account? <a href="/register">Register here</a></p>
        <p class="hint">Admin Login: admin@bus.com / admin123</p>
      </form>
    </section>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.success) {
        localStorage.setItem('user', JSON.stringify(result.user));
        alert(result.message);
        if (result.user.role === 'admin') {
          window.location.href = '/admin';
        } else {
          window.location.href = '/dashboard';
        }
      } else {
        alert(result.message);
      }
    });
  </script>
</body>
</html>
